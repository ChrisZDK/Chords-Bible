<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=../index.html?mode=progressions" />
  <title>Keys &amp; Progressions moved - Chordyssey</title>
</head>
<body>
  <script>
    const target = new URL("../index.html", window.location.href);
    const params = new URLSearchParams(window.location.search);
    const key = params.get("key") || params.get("root");

    target.searchParams.set("mode", "progressions");
    target.searchParams.set("scale", "major");

    if (key) {
      target.searchParams.set("root", key);
    }

    target.hash = window.location.hash;
    window.location.replace(target);
  </script>
  <p>This page moved to <a href="../index.html?mode=progressions">Keys &amp; Progressions</a>.</p>
</body>
</html>
